name: Deploy GitHub Pages (Static TNWW)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - "config/**"
      - "widget/**"
      - ".github/workflows/pages-static.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-static"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "widget/package-lock.json"

      - name: Install API deps
        run: python -m pip install --upgrade pip && python -m pip install -e ./api

      - name: Generate static API payloads
        env:
          TNWW_CONFIG_DIR: ${{ github.workspace }}/config
          TNWW_SQLITE_PATH: ${{ github.workspace }}/tnww.sqlite
          TNWW_TIMEZONE: America/Chicago
          TNWW_OPENMETEO_LAT: "36.0598"
          TNWW_OPENMETEO_LON: "-86.8291"
        run: python api/scripts/export_static_api.py --output-dir widget/public/static-api

      - name: Install widget deps
        working-directory: widget
        run: npm ci

      - name: Build widget
        working-directory: widget
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: widget/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
